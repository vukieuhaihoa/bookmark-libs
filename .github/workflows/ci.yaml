name: ci-pipeline
on:
  pull_request:
    branches: [ "main" ]
  
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  ci_pure_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run tests
        run: make docker-test
